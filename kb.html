<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Knowledge Base Assistant</title>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap"
    rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #307fe2;
      --primary-light: #e8f1fd;
      --primary-dark: #1a5db8;
      --primary-glow: rgba(48, 127, 226, 0.15);
      --bg: #f0f4fa;
      --surface: #ffffff;
      --surface-2: #f7f9fc;
      --border: #e2e8f4;
      --text: #1a2235;
      --text-muted: #7a8aaa;
      --text-light: #b0bdd4;
      --shadow-sm: 0 1px 3px rgba(30, 60, 120, 0.07), 0 1px 2px rgba(30, 60, 120, 0.05);
      --shadow-md: 0 4px 16px rgba(30, 60, 120, 0.10), 0 1px 4px rgba(30, 60, 120, 0.06);
      --shadow-lg: 0 8px 32px rgba(30, 60, 120, 0.13), 0 2px 8px rgba(30, 60, 120, 0.07);
      --radius: 16px;
      --radius-sm: 10px;
      --radius-xs: 6px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(48, 127, 226, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(48, 127, 226, 0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      width: 100%;
      max-width: 780px;
      position: relative;
      z-index: 1;
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(18px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 20px;
      padding: 0 4px;
    }

    .header-icon {
      width: 44px;
      height: 44px;
      background: var(--primary);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 12px var(--primary-glow);
      flex-shrink: 0;
    }

    .header-icon i,
    .header-icon svg {
      width: 22px;
      height: 22px;
      fill: none;
      stroke: #fff;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .header-text h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      color: var(--text);
      letter-spacing: -0.3px;
      line-height: 1.2;
    }

    .header-text p {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* ── Server status pill (bottom right) ── */
    .server-status-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 8px 16px;
      border-radius: 99px;
      box-shadow: var(--shadow-md);
      z-index: 100;
      transition: all 0.3s ease;
    }

    .status-dot-indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #f59e0b;
      box-shadow: 0 0 6px rgba(245, 158, 11, 0.5);
      flex-shrink: 0;
    }

    .status-dot-indicator.online {
      background: #22c55e;
      box-shadow: 0 0 6px rgba(34, 197, 94, 0.5);
      animation: pulse 2s ease infinite;
    }

    .status-dot-indicator.offline {
      background: #ef4444;
      box-shadow: 0 0 6px rgba(239, 68, 68, 0.5);
    }

    /* ── Connecting banner ── */
    .chat-banner {
      background: rgba(245, 158, 11, 0.1);
      color: #b45309;
      padding: 10px 16px;
      border-radius: var(--radius-sm);
      font-size: 13.5px;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      font-weight: 500;
      animation: fadeIn 0.3s ease;
    }

    .chat-banner.online {
      display: none;
    }

    .chat-banner svg {
      width: 16px;
      height: 16px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      100% {
        transform: rotate(360deg);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.5;
      }
    }

    /* ── Chat box ── */
    .chat-container {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-lg);
      display: flex;
      flex-direction: column;
      height: 72vh;
      min-height: 480px;
      overflow: hidden;
    }

    .messages {
      flex: 1;
      padding: 24px 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 18px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar {
      width: 5px;
    }

    .messages::-webkit-scrollbar-track {
      background: transparent;
    }

    .messages::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 99px;
    }

    /* ── Empty state ── */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-muted);
      text-align: center;
      padding: 40px 20px;
    }

    .empty-state-icon {
      width: 56px;
      height: 56px;
      background: var(--primary-light);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 4px;
    }

    .empty-state-icon i,
    .empty-state-icon svg {
      width: 26px;
      height: 26px;
      stroke: var(--primary);
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .empty-state h3 {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
    }

    .empty-state p {
      font-size: 13.5px;
      color: var(--text-muted);
      max-width: 280px;
      line-height: 1.6;
    }

    /* ── Chunk stats bar inside empty state ── */
    .stats-bar {
      display: flex;
      gap: 20px;
      margin-top: 4px;
    }

    .stat-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .stat-value {
      font-size: 18px;
      font-weight: 600;
      color: var(--primary);
    }

    .stat-label {
      font-size: 11px;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 8px;
    }

    .suggestion-chip {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 6px 14px;
      font-size: 12.5px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s ease;
      font-family: 'DM Sans', sans-serif;
    }

    .suggestion-chip:hover {
      background: var(--primary-light);
      border-color: var(--primary);
      color: var(--primary);
    }

    /* ── Message bubbles ── */
    .msg {
      display: flex;
      flex-direction: column;
      animation: msgIn 0.25s ease both;
    }

    @keyframes msgIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .msg.user {
      align-items: flex-end;
    }

    .msg.bot {
      align-items: flex-start;
    }

    .bubble {
      max-width: 78%;
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 14.5px;
      line-height: 1.65;
    }

    .msg.user .bubble {
      background: var(--primary);
      color: #fff;
      border-bottom-right-radius: var(--radius-xs);
      box-shadow: 0 3px 12px var(--primary-glow);
    }

    .msg.bot .bubble {
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border);
      border-bottom-left-radius: var(--radius-xs);
      box-shadow: var(--shadow-sm);
    }

    .msg.bot .bubble p {
      margin-bottom: 10px;
    }

    .msg.bot .bubble p:last-child {
      margin-bottom: 0;
    }

    .msg.bot .bubble ul,
    .msg.bot .bubble ol {
      margin-left: 20px;
      margin-bottom: 10px;
    }

    .msg.bot .bubble li {
      margin-bottom: 4px;
    }

    .msg.bot .bubble strong {
      font-weight: 600;
      color: var(--primary-dark);
    }

    .msg.bot .bubble code {
      background: rgba(0, 0, 0, 0.05);
      padding: 2px 4px;
      border-radius: 4px;
      font-size: 13px;
      font-family: monospace;
    }

    .msg.bot .bubble pre {
      background: var(--surface);
      padding: 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      overflow-x: auto;
      margin-bottom: 10px;
    }

    .msg.bot .bubble pre code {
      background: transparent;
      padding: 0;
    }

    /* ── Label row: "Assistant" + model badge ── */
    .msg-label-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 5px;
      padding: 0 4px;
    }

    .msg-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--text-light);
    }

    /* ── Model badge (Gemini / Groq) ── */
    .model-badge {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 99px;
      border: 1px solid;
    }

    .model-badge.gemini {
      color: #1a73e8;
      background: #e8f1fd;
      border-color: #c5d9f9;
    }

    .model-badge.groq {
      color: #7c3aed;
      background: #f3eeff;
      border-color: #ddd0fa;
    }

    /* ── Sources card ── */
    .sources {
      margin-top: 10px;
      padding: 10px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      max-width: 78%;
    }

    .sources-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-light);
      margin-bottom: 7px;
    }

    .source-link {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12.5px;
      color: var(--primary);
      text-decoration: none;
      padding: 3px 0;
      transition: color 0.15s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .source-link::before {
      content: '';
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--primary);
      flex-shrink: 0;
    }

    .source-link:hover {
      color: var(--primary-dark);
      text-decoration: underline;
    }

    /* ── Thinking loader ── */
    .thinking .bubble {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 14px 18px;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-light);
      animation: bounce 1.2s ease infinite;
    }

    .dot:nth-child(2) {
      animation-delay: 0.2s;
    }

    .dot:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes bounce {

      0%,
      80%,
      100% {
        transform: scale(0.7);
        opacity: 0.5;
      }

      40% {
        transform: scale(1);
        opacity: 1;
      }
    }

    /* ── Input area ── */
    .input-area {
      padding: 14px 16px;
      border-top: 1px solid var(--border);
      background: var(--surface-2);
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .input-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 0 16px;
      transition: all 0.2s;
    }

    .input-wrap:focus-within {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-glow), inset 0 0 10px rgba(48, 127, 226, 0.02);
    }

    .search-icon {
      width: 18px;
      height: 18px;
      color: var(--text-light);
      margin-right: 12px;
      flex-shrink: 0;
    }

    input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      font-family: 'DM Sans', sans-serif;
      font-size: 14.5px;
      color: var(--text);
      padding: 13px 0;
    }

    input:disabled {
      cursor: not-allowed;
      opacity: 0.6;
    }

    input::placeholder {
      color: var(--text-light);
    }

    /* ── Visualizer ── */
    .visualizer {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 3px;
      height: 12px;
      margin-bottom: 8px;
      width: 100%;
    }

    .visualizer.active {
      display: flex;
    }

    .visualizer .bar {
      width: 2.5px;
      height: 3px;
      background: var(--primary);
      border-radius: 1px;
      transition: height 0.1s;
    }

    .visualizer.active .bar {
      animation: wave 0.8s infinite alternate-reverse ease-in-out;
    }

    .visualizer.active .bar:nth-child(even) {
      animation-delay: 0.1s;
    }

    .visualizer.active .bar:nth-child(3n) {
      animation-delay: 0.2s;
    }

    @keyframes wave {
      from {
        height: 3px;
      }

      to {
        height: 12px;
      }
    }

    /* ── Action Buttons inside Input ── */
    .input-actions {
      display: flex;
      gap: 4px;
      margin-left: auto;
      padding-left: 10px;
    }

    /* ── Enhance button ── */
    .enhance-btn {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text-light);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: all 0.2s;
    }

    .enhance-btn:hover:not(:disabled) {
      color: var(--primary);
      background: rgba(48, 127, 226, 0.05);
    }

    .enhance-btn svg {
      width: 18px;
      height: 18px;
    }

    /* ── Mic button ── */
    .mic-btn {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text-light);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: all 0.2s;
    }

    .mic-btn:hover:not(:disabled):not(.listening) {
      color: var(--primary);
      background: rgba(48, 127, 226, 0.05);
    }

    .mic-btn.listening {
      background: rgba(239, 68, 68, 0.05);
      color: #ef4444;
    }

    .mic-btn svg {
      width: 18px;
      height: 18px;
    }

    @keyframes rotate-glow {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    .send-btn {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      border: none;
      background: var(--primary);
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .send-btn:disabled {
      background: var(--text-light);
      opacity: 0.5;
    }

    .send-btn svg {
      width: 18px;
      height: 18px;
      stroke: #fff;
      stroke-width: 2;
    }

    /* Recommendations / Ambiguity Buttons */
    .recommendations {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }
    .opt-btn {
      background: rgba(var(--primary-rgb), 0.1);
      color: var(--primary);
      border: 1px solid rgba(var(--primary-rgb), 0.2);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .opt-btn:hover {
      background: var(--primary);
      color: var(--bg);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(var(--primary-rgb), 0.3);
    }

    .footer {
      text-align: center;
      margin-top: 14px;
      font-size: 12px;
      color: var(--text-light);
    }
    .no-info-card {
      background: #f8f9fc;
      border: 1px solid #e2e6f0;
      border-radius: 12px;
      padding: 24px;
      text-align: center;
      max-width: 480px;
      margin: 12px auto;
    }
    .no-info-icon {
      font-size: 28px;
      margin-bottom: 10px;
    }
    .no-info-title {
      font-size: 15px;
      font-weight: 600;
      color: #2d3748;
      margin-bottom: 6px;
    }
    .no-info-subtitle {
      font-size: 13px;
      color: #718096;
      margin-bottom: 16px;
    }
    .no-info-link {
      display: inline-block;
      background: #4f46e5;
      color: white;
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 13px;
      text-decoration: none;
    }
    .no-info-link:hover {
      background: #4338ca;
    }
    /* ── Guide prompt card ── */
    .guide-prompt-card {
      background: linear-gradient(135deg, #1a2235 0%, #243050 100%);
      border-radius: 16px;
      padding: 18px;
      max-width: 90%;
      box-shadow: 0 4px 16px rgba(30,60,120,0.15);
      margin-top: 4px;
    }
    .guide-card-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: rgba(255,255,255,0.45);
      margin-bottom: 4px;
    }
    .guide-card-task {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 16px;
      line-height: 1.3;
    }
    .guide-btns-row {
      display: flex;
      gap: 10px;
    }
    .guide-choice-btn {
      flex: 1;
      padding: 12px 14px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 3px;
      transition: all 0.2s;
      font-family: 'DM Sans', sans-serif;
    }
    .guide-choice-btn .btn-icon  { font-size: 20px; margin-bottom: 2px; }
    .guide-choice-btn .btn-label { font-size: 14px; font-weight: 600; }
    .guide-choice-btn .btn-desc  { font-size: 11px; opacity: 0.7; }
    .guide-choice-btn.voice-btn  { background: rgba(124,58,237,0.15); border: 1px solid rgba(124,58,237,0.3); color: #c4b5fd; }
    .guide-choice-btn.voice-btn:hover { background: rgba(124,58,237,0.3); transform: translateY(-1px); }
    .guide-choice-btn.live-btn   { background: rgba(14,165,233,0.15); border: 1px solid rgba(14,165,233,0.3); color: #7dd3fc; }
    .guide-choice-btn.live-btn:hover  { background: rgba(14,165,233,0.3); transform: translateY(-1px); }
    /* ── Voice step card ── */
    .voice-step-card {
      background: linear-gradient(135deg, #4c1d95 0%, #5b21b6 100%);
      border-radius: 14px;
      padding: 16px;
      max-width: 90%;
      color: white;
      margin-top: 4px;
    }
    .voice-step-card .step-num  { font-size: 11px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; color: rgba(255,255,255,0.45); margin-bottom: 6px; }
    .voice-step-card .step-text { font-size: 14px; line-height: 1.55; font-weight: 500; }
    .voice-step-card .step-hint { margin-top: 10px; font-size: 12px; color: rgba(255,255,255,0.4); }
  </style>
</head>

<body>

  <div class="wrapper">

    <div class="header">
      <div class="header-icon">
        <i data-lucide="library"></i>
      </div>
      <div class="header-text">
        <h1>Knowledge Assistant</h1>
        <p>Ask anything from your knowledge base</p>
      </div>
    </div>

    <div class="chat-container">
      <div class="chat-banner" id="chatBanner">
        <i data-lucide="loader-2"></i>
        Server is connecting... Please wait.
      </div>

      <div class="messages" id="messages">
        <div class="empty-state" id="emptyState">
          <div class="empty-state-icon">
            <i data-lucide="message-square"></i>
          </div>
          <h3>How can I help you?</h3>
          <p>Ask a question about Hushly features, workflows, or product behaviour.</p>

          <div class="suggestions" id="suggestionContainer">
            <!-- Dynamic suggestions injected here -->
          </div>
        </div>
      </div>

      <div class="input-area">
        <div class="visualizer" id="visualizer">
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
        </div>
        <div class="input-wrap">
          <i data-lucide="search" class="search-icon"></i>
          <input id="input" placeholder="Server is connecting..." autocomplete="off" disabled />
          <div class="input-actions">
            <button class="enhance-btn" id="enhanceBtn" onclick="enhanceQuery()" title="Enhance prompt" disabled>
              <i data-lucide="sparkles"></i>
            </button>
            <button class="mic-btn" id="micBtn" onclick="toggleMic()" title="Voice Input" disabled>
              <i data-lucide="mic"></i>
            </button>
            <button class="send-btn" id="sendBtn" onclick="send()" title="Send" disabled>
              <i data-lucide="send"></i>
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="footer">Powered by your knowledge base · RAG Assistant</div>
  </div>

  <!-- Server status pill -->
  <div class="server-status-btn" id="serverStatusWidget">
    <div class="status-dot-indicator" id="statusDotIndicator"></div>
    <span id="statusTextWidget">Connecting...</span>
  </div>

  <script>
    const BACKEND_URL = "http://localhost:8000";
    const messagesEl = document.getElementById("messages");
    const inputEl = document.getElementById("input");
    const emptyState = document.getElementById("emptyState");
    const sendBtn = document.getElementById("sendBtn");
    const enhanceBtn = document.getElementById("enhanceBtn");
    const micBtn = document.getElementById("micBtn");
    const chatBanner = document.getElementById("chatBanner");
    const statusDot = document.getElementById("statusDotIndicator");
    const statusText = document.getElementById("statusTextWidget");
    const visualizerEl = document.getElementById("visualizer");
    const suggestionContainer = document.getElementById("suggestionContainer");

    const SUGGESTION_POOL = [
      "What is GEOSherpa?",
      "How do I create an Experience?",
      "Setup ABM Page",
      "How to upload an asset?",
      "What is an ABM Page?",
      "Configure UTM tracking",
      "What are Personas?",
      "How to use GEOSherpa for SEO?",
      "What is a Content Stream?",
      "How to add a visitor group?",
      "What is the difference between Hubs and Streams?",
      "How to integrate with Salesforce?",
      "What is Hushly AEO?",
      "How to set up a campaign template?"
    ];

    function initSuggestions() {
      if (!suggestionContainer) return;
      const shuffled = [...SUGGESTION_POOL].sort(() => 0.5 - Math.random());
      const selected = shuffled.slice(0, 3);
      suggestionContainer.innerHTML = selected.map(q => 
        `<button class="suggestion-chip" onclick="fillInput(this)">${q}</button>`
      ).join("");
    }

    let isServerConnected = false;
    let chatHistory = []; // Track recent conversation memory
    let lastInputMethod = "text"; // "text" or "voice"

    // ── GUIDED MODE STATE ──
    // guidedMode: null | 'voice' | 'live' (live has no visual overlay in standalone page)
    let guidedMode = null;
    let guidedData = null;
    let currentStep = 0;
    let inGuidePrompt = false; // waiting for user to choose voice/live guide

    // ── Health check — now also reads chunk/vector counts ──
    async function checkServerStatus() {
      try {
        const res = await fetch(`${BACKEND_URL}/health`);
        if (!res.ok) throw new Error("Not OK");
        const info = await res.json();

        if (!isServerConnected) {
          isServerConnected = true;
          inputEl.disabled = false;
          sendBtn.disabled = false;
          enhanceBtn.disabled = false;
          micBtn.disabled = false;
          inputEl.placeholder = "Ask a question…";
          chatBanner.classList.add("online");
          statusDot.className = "status-dot-indicator online";
          statusText.textContent = "Server is running";
        }
      } catch {
        if (isServerConnected !== false) {
          isServerConnected = false;
          inputEl.disabled = true;
          sendBtn.disabled = true;
          enhanceBtn.disabled = true;
          micBtn.disabled = true;
          inputEl.placeholder = "Server disconnected...";
          chatBanner.classList.remove("online");
          chatBanner.innerHTML = `<i data-lucide="circle-off"></i> Server disconnected. Attempting to reconnect...`;
          lucide.createIcons();
          chatBanner.style.color = "#ef4444";
          chatBanner.style.background = "rgba(239,68,68,0.1)";
          statusDot.className = "status-dot-indicator offline";
          statusText.textContent = "Disconnected";
          statsBar.style.display = "none";
        }
      }
    }

    setInterval(checkServerStatus, 2000);
    checkServerStatus();
    initSuggestions(); // Initialize random suggestions on load

    // ── VOICE LOGIC (Web Speech API) ──
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition;
    let isListening = false;

    if (SpeechRecognition) {
      recognition = new SpeechRecognition();
      recognition.continuous = false;
      recognition.interimResults = false;
      recognition.lang = "en-US";

      recognition.onstart = () => {
        isListening = true;
        micBtn.classList.add("listening");
        visualizerEl.classList.add("active");
      };

      recognition.onend = () => {
        isListening = false;
        micBtn.classList.remove("listening");
        visualizerEl.classList.remove("active");
        // In voice guide mode, re-open mic after speech settles
        if (guidedMode === "voice" && !window.speechSynthesis?.speaking) {
          setTimeout(() => { if (!isListening) { try { recognition.start(); } catch {} } }, 400);
        }
      };

      recognition.onerror = (e) => {
        if (e.error !== "aborted" && e.error !== "no-speech") console.warn("STT error:", e.error);
        isListening = false;
        micBtn.classList.remove("listening");
        visualizerEl.classList.remove("active");
      };

      // onresult is set after guide functions are defined (see below)
    }

    function toggleMic() {
      if (!recognition) {
        alert("Your browser does not support Voice Recognition.");
        return;
      }
      if (isListening) {
        recognition.stop();
      } else {
        // Interrupt AI voice if talking
        window.speechSynthesis.cancel();
        recognition.start();
      }
    }

    // ── Voice cache (fix Chrome async voice loading bug) ──
    let cachedVoices = [];
    function loadVoices() {
      if (!window.speechSynthesis) return;
      const v = window.speechSynthesis.getVoices();
      if (v.length) cachedVoices = v;
    }
    loadVoices();
    if (window.speechSynthesis) window.speechSynthesis.onvoiceschanged = loadVoices;

    function getBestVoice() {
      if (!cachedVoices.length) loadVoices();
      const pref = [
        v => v.name.includes("Google") && v.name.includes("US English"),
        v => v.name.includes("Google") && v.name.toLowerCase().includes("english"),
        v => v.lang === "en-US",
        v => v.lang.startsWith("en"),
      ];
      for (const test of pref) {
        const found = cachedVoices.find(test);
        if (found) return found;
      }
      return cachedVoices[0] || null;
    }

    function speak(text, onDone) {
      if (!window.speechSynthesis) { onDone && onDone(); return; }
      window.speechSynthesis.cancel();
      // Wait a tick after cancel (Chrome stability fix)
      setTimeout(() => {
        const clean = text.replace(/[*_#`~\[\]()]/g, "").replace(/\s+/g, " ").trim();
        const utterance = new SpeechSynthesisUtterance(clean);
        utterance.voice = getBestVoice();
        utterance.rate = 1.0;
        utterance.pitch = 1.0;
        utterance.onstart = () => visualizerEl.classList.add("active");
        utterance.onend = () => {
          visualizerEl.classList.remove("active");
          onDone && onDone();
          if (guidedMode && recognition && !isListening) {
            try { recognition.start(); } catch {}
          }
        };
        utterance.onerror = () => {
          visualizerEl.classList.remove("active");
          onDone && onDone();
        };
        window.speechSynthesis.speak(utterance);
      }, 100);
    }

    // ── CHAT LOGIC ──
    function fillInput(btn) { 
      inputEl.value = btn.textContent; 
      inputEl.focus(); 
      send(); // Enable auto-send for suggestion chips as well
    }
    function hideEmpty() { if (emptyState) emptyState.style.display = "none"; }
    function scroll() { messagesEl.scrollTop = messagesEl.scrollHeight; }
    function escHtml(str) { return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;"); }

    function addUserMsg(text) {
      hideEmpty();
      const msg = document.createElement("div");
      msg.className = "msg user";
      msg.innerHTML = `
      <div class="msg-label-row"><span class="msg-label">You</span></div>
      <div class="bubble">${escHtml(text)}</div>`;
      messagesEl.appendChild(msg);
      scroll();
    }

    // ── addBotMsg now accepts recommendations ──
    function addBotMsg(text, sources = [], titles = [], modelUsed = "", recommendations = []) {
      hideEmpty();
      const msg = document.createElement("div");
      msg.className = "msg bot";

      // Model badge
      const badgeHtml = modelUsed
        ? `<span class="model-badge ${modelUsed.toLowerCase()}">${modelUsed}</span>`
        : "";

      // Sources
      let srcHtml = "";
      const shownSources = sources.slice(0, 3);
      if (shownSources.length) {
        const links = shownSources.map((url, i) => {
          const label = (titles && titles[i]) ? titles[i] : shortenUrl(url);
          return `<a class="source-link" href="${url}" target="_blank" title="${url}">${escHtml(label)}</a>`;
        }).join("");
        srcHtml = `<div class="sources"><div class="sources-title">Sources</div>${links}</div>`;
      }

      // Recommendations / Ambiguity Options
      let recHtml = "";
      if (recommendations && recommendations.length) {
        const btns = recommendations.map(opt => 
          `<button class="opt-btn" onclick="sendOption('${escHtml(opt)}')">
            <i data-lucide="message-square" style="width:14px;height:14px"></i>
            ${escHtml(opt)}
          </button>`
        ).join("");
        recHtml = `<div class="recommendations">${btns}</div>`;
      }

      msg.innerHTML = `
      <div class="msg-label-row">
        <span class="msg-label">Assistant</span>
        ${badgeHtml}
      </div>
      <div class="bubble">${marked.parse(text)}</div>
      ${srcHtml}
      ${recHtml}`;
      messagesEl.appendChild(msg);
      lucide.createIcons(); // Refresh icons for new buttons
      scroll();
    }

    function sendOption(opt) {
      inputEl.value = opt;
      send();
    }

    // ── Fallback links shown when no info found in KB ──
    function addFallbackLinks(searchUrl, modelUsed = "") {
      hideEmpty();
      const msg = document.createElement("div");
      msg.className = "msg bot";

      const badgeHtml = modelUsed
        ? `<span class="model-badge ${modelUsed.toLowerCase()}">${modelUsed}</span>`
        : "";

      const links = [
        { url: searchUrl, label: "🔍 Search Hushly Knowledge Base" },
        { url: "https://hushly.freshdesk.com/support/home", label: "🏠 Hushly Support Home" },
        { url: "mailto:support@hushly.com", label: "✉️ Contact Hushly Support" },
      ].map(l =>
        `<a class="source-link" href="${l.url}" target="_blank">${escHtml(l.label)}</a>`
      ).join("");

      msg.innerHTML = `
      <div class="msg-label-row">
        <span class="msg-label">Assistant</span>
        ${badgeHtml}
      </div>
      <div class="bubble">I don't have that information in the knowledge base. Please check the links below:</div>
      <div class="sources"><div class="sources-title">Helpful Links</div>${links}</div>`;
      messagesEl.appendChild(msg);
      scroll();
    }

    function renderNoInfo(searchUrl) {
      hideEmpty();
      const msg = document.createElement("div");
      msg.className = "msg bot";
      msg.innerHTML = `
        <div class="no-info-card">
          <div class="no-info-icon">🔍</div>
          <div class="no-info-title">I couldn't find that in the Hushly knowledge base.</div>
          <div class="no-info-subtitle">Try rephrasing, or search the Hushly Help Center directly.</div>
          <a class="no-info-link" href="${searchUrl}" target="_blank">
            Search Help Center →
          </a>
        </div>
      `;
      messagesEl.appendChild(msg);
      scroll();
    }

    // Shorten raw URL to last slug segment as fallback label
    function shortenUrl(url) {
      try {
        const slug = new URL(url).pathname.split("/").filter(Boolean).pop() || url;
        return slug.replace(/-/g, " ").replace(/\b\w/g, c => c.toUpperCase());
      } catch { return url; }
    }

    function addThinking() {
      hideEmpty();
      const msg = document.createElement("div");
      msg.className = "msg bot thinking";
      msg.id = "thinking";
      msg.innerHTML = `
      <div class="msg-label-row"><span class="msg-label">Assistant</span></div>
      <div class="bubble">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>`;
      messagesEl.appendChild(msg);
      scroll();
      return msg;
    }

    function removeThinking() {
      const t = document.getElementById("thinking");
      if (t) t.remove();
    }

    async function enhanceQuery() {
      const query = inputEl.value.trim();
      if (!query) return;

      enhanceBtn.disabled = true;
      enhanceBtn.classList.add("loading");

      try {
        const res = await fetch(`${BACKEND_URL}/enhance`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            query,
            history: chatHistory.slice(-4) // Pass only recent history
          })
        });

        if (res.ok) {
          const data = await res.json();
          inputEl.value = data.enhanced;
          inputEl.focus();
        }
      } catch (e) {
        console.error("Enhance failed:", e);
      } finally {
        enhanceBtn.classList.remove("loading");
        enhanceBtn.disabled = false;
      }
    }

    async function send() {
      const query = inputEl.value.trim();
      if (!query) return;
      inputEl.value = "";
      addUserMsg(query);

      const qLower = query.toLowerCase();

      // ── Guide prompt: waiting for voice/live choice ──
      if (inGuidePrompt) {
        if (qLower.match(/voice|speak|talk|audio/)) {
          inGuidePrompt = false;
          removeGuidePromptCard();
          startVoiceGuide();
          return;
        } else if (qLower.match(/live|visual|highlight|show|click|screen/)) {
          inGuidePrompt = false;
          removeGuidePromptCard();
          addBotMsg("*(Live Guide requires the Chrome extension. Starting Voice Guide instead.)*");
          startVoiceGuide();
          return;
        } else if (qLower.match(/yes|yeah|yep|sure|ok|okay|start|guide/)) {
          inGuidePrompt = false;
          removeGuidePromptCard();
          startVoiceGuide();
          return;
        } else if (qLower.match(/no|nope|nah|skip|cancel/)) {
          inGuidePrompt = false;
          removeGuidePromptCard();
          addBotMsg("Got it! Let me know if you need help with anything else.");
          return;
        }
      }

      // ── Already in guided mode: intercept navigation commands ──
      if (guidedMode && guidedData) {
        if (qLower.match(/\b(next|done|continue|i clicked|finished|yes|yep|got it)\b/)) {
          nextStep(); return;
        } else if (qLower.match(/\b(back|previous|go back)\b/)) {
          prevStep(); return;
        } else if (qLower.match(/\b(repeat|again|say that again)\b/)) {
          readCurrentVoiceStep(); return;
        } else if (qLower.match(/\b(stop|cancel|quit|exit)\b/)) {
          stopGuide(); return;
        }
        // Unrelated question — suspend guide
        guidedMode = null;
        addBotMsg("*(Guide paused to answer your question)*");
      }

      addThinking();

      try {
        const res = await fetch(`${BACKEND_URL}/ask`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            query,
            history: chatHistory.slice(-4) // Pass last 4 messages for context
          })
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.error || "Server error");
        }

        const data = await res.json();
        removeThinking();

        if (data.no_info) {
          const searchUrl = `https://hushly.freshdesk.com/support/search/solutions?term=${encodeURIComponent(query)}`;
          renderNoInfo(searchUrl);
          chatHistory.push({ role: "user", content: query });
          chatHistory.push({ role: "assistant", content: "[NO_INFO]" });
          return;
        } else {
          // Normal KB answer
          addBotMsg(data.answer, data.sources || [], data.titles || [], data.model_used || "", data.recommendations || []);
          chatHistory.push({ role: "user", content: query });
          chatHistory.push({ role: "assistant", content: data.answer });

          // Check if this answer contains step-by-step instructions silently
          checkActionable(data.answer);
        }
      } catch (err) {
        removeThinking();
        addBotMsg(`⚠️ ${err.message}`);
      }
    }

    // ── GUIDED MODE LOGIC ──
    async function checkActionable(answerText) {
      try {
        const res = await fetch(`${BACKEND_URL}/generate_steps`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ answer: answerText })
        });
        if (!res.ok) return;
        const data = await res.json();
        if (data.is_actionable_task && data.steps && data.steps.length > 0) {
          guidedData = data;
          inGuidePrompt = true;
          showGuidePromptCard(data.task_title);
          if (lastInputMethod === "voice") {
            speak(`I can guide you through ${data.task_title} step by step. Say voice guide or live guide to choose.`);
          }
        }
      } catch (e) {
        console.error("Failed to generate steps", e);
      }
    }

    function showGuidePromptCard(taskTitle) {
      hideEmpty();
      const el = document.createElement("div");
      el.className = "msg bot";
      el.id = "guide-prompt-msg";
      el.innerHTML = `
        <div class="msg-label-row"><span class="msg-label">Guide Available</span></div>
        <div class="guide-prompt-card">
          <div class="guide-card-title">Interactive Guide</div>
          <div class="guide-card-task">How to: ${escHtml(taskTitle)}</div>
          <div class="guide-btns-row">
            <button class="guide-choice-btn voice-btn" onclick="kbStartVoiceGuide()">
              <span class="btn-icon">🎤</span>
              <span class="btn-label">Voice Guide</span>
              <span class="btn-desc">Spoken step-by-step</span>
            </button>
            <button class="guide-choice-btn live-btn" onclick="kbStartLiveGuide()">
              <span class="btn-icon">👆</span>
              <span class="btn-label">Live Guide</span>
              <span class="btn-desc">Use Chrome extension</span>
            </button>
          </div>
        </div>`;
      messagesEl.appendChild(el);
      scroll();
    }

    function removeGuidePromptCard() {
      const el = document.getElementById("guide-prompt-msg");
      if (el) el.remove();
    }

    window.kbStartVoiceGuide = () => {
      inGuidePrompt = false;
      removeGuidePromptCard();
      addUserMsg("Start Voice Guide");
      startVoiceGuide();
    };

    window.kbStartLiveGuide = () => {
      inGuidePrompt = false;
      removeGuidePromptCard();
      addUserMsg("Start Live Guide");
      addBotMsg("The **Live Guide** with visual highlights requires the **Hushly Chrome Extension**. Starting **Voice Guide** instead for this standalone page.");
      startVoiceGuide();
    };

    function startVoiceGuide() {
      guidedMode = "voice";
      currentStep = 0;
      addBotMsg(`**Voice Guide started: ${guidedData.task_title}**\n\nSay or type **"next"** / **"I clicked"** to advance, **"back"** to go back, **"repeat"** to replay, or **"stop"** to exit.`);
      readCurrentVoiceStep();
      if (recognition && !isListening) {
        setTimeout(() => { try { recognition.start(); } catch {} }, 600);
      }
    }

    function readCurrentVoiceStep() {
      const step = guidedData.steps[currentStep];
      const text = step.text || step;
      const total = guidedData.steps.length;

      const el = document.createElement("div");
      el.className = "msg bot";
      el.innerHTML = `
        <div class="msg-label-row"><span class="msg-label">Voice Guide</span></div>
        <div class="voice-step-card">
          <div class="step-num">Step ${currentStep + 1} of ${total}</div>
          <div class="step-text">${escHtml(text)}</div>
          <div class="step-hint">🎤 Say "next" or "I clicked" to continue</div>
        </div>`;
      messagesEl.appendChild(el);
      scroll();

      speak(`Step ${currentStep + 1}: ${text}`, () => {
        if (guidedMode === "voice" && recognition && !isListening) {
          try { recognition.start(); } catch {}
        }
      });
    }

    function nextStep() {
      currentStep++;
      if (currentStep >= guidedData.steps.length) {
        guidedMode = null;
        const msg = "Task complete! Great job. What else can I help you with?";
        addBotMsg(`🎉 **${msg}**`);
        speak(msg);
      } else {
        readCurrentVoiceStep();
      }
    }

    function prevStep() {
      if (currentStep > 0) currentStep--;
      addBotMsg("*(Going back one step)*");
      readCurrentVoiceStep();
    }

    function stopGuide() {
      guidedMode = null;
      inGuidePrompt = false;
      window.speechSynthesis?.cancel();
      if (isListening) { try { recognition?.stop(); } catch {} }
      addBotMsg("*(Guide stopped. Ask another question whenever you're ready.)*");
    }

    // Intercept voice commands during guide mode in recognition handler
    recognition && (recognition.onresult = (event) => {
      const transcript = event.results[0][0].transcript.trim();
      if (guidedMode === "voice") {
        handleVoiceGuideCommand(transcript);
      } else if (inGuidePrompt) {
        handleGuidePromptVoice(transcript);
      } else {
        inputEl.value = transcript;
        lastInputMethod = "voice";
        send();
        lastInputMethod = "text";
      }
    });

    function handleVoiceGuideCommand(transcript) {
      const t = transcript.toLowerCase();
      if (t.match(/\b(next|done|continue|i clicked|finished|ok|okay|yes|yep|got it)\b/)) {
        nextStep();
      } else if (t.match(/\b(back|previous|go back)\b/)) {
        prevStep();
      } else if (t.match(/\b(repeat|again|say that again)\b/)) {
        readCurrentVoiceStep();
      } else if (t.match(/\b(stop|cancel|quit|exit)\b/)) {
        stopGuide();
      } else {
        addBotMsg(`*(Heard: "${escHtml(transcript)}")*\n\nSay **"next"**, **"back"**, **"repeat"**, or **"stop"**.`);
        speak("Say next to continue, back, repeat, or stop.");
      }
    }

    function handleGuidePromptVoice(transcript) {
      const t = transcript.toLowerCase();
      if (t.match(/voice|speak/)) { inGuidePrompt = false; removeGuidePromptCard(); startVoiceGuide(); }
      else if (t.match(/live|visual|highlight/)) { inGuidePrompt = false; removeGuidePromptCard(); addBotMsg("*(Live Guide requires the Chrome extension. Starting Voice Guide instead.)*"); startVoiceGuide(); }
      else if (t.match(/no|nope|skip|cancel/)) { inGuidePrompt = false; removeGuidePromptCard(); addBotMsg("Got it! Let me know if you need anything else."); }
      else { inputEl.value = transcript; lastInputMethod = "voice"; send(); lastInputMethod = "text"; }
    }

    inputEl.addEventListener("keypress", e => { if (e.key === "Enter") send(); });
    
    // Initialize Lucide icons
    lucide.createIcons();
  </script>
</body>

</html>
