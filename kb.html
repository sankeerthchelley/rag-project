<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Knowledge Base Assistant</title>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap"
    rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #307fe2;
      --primary-light: #e8f1fd;
      --primary-dark: #1a5db8;
      --primary-glow: rgba(48, 127, 226, 0.15);
      --bg: #f0f4fa;
      --surface: #ffffff;
      --surface-2: #f7f9fc;
      --border: #e2e8f4;
      --text: #1a2235;
      --text-muted: #7a8aaa;
      --text-light: #b0bdd4;
      --shadow-sm: 0 1px 3px rgba(30, 60, 120, 0.07), 0 1px 2px rgba(30, 60, 120, 0.05);
      --shadow-md: 0 4px 16px rgba(30, 60, 120, 0.10), 0 1px 4px rgba(30, 60, 120, 0.06);
      --shadow-lg: 0 8px 32px rgba(30, 60, 120, 0.13), 0 2px 8px rgba(30, 60, 120, 0.07);
      --radius: 16px;
      --radius-sm: 10px;
      --radius-xs: 6px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(48, 127, 226, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(48, 127, 226, 0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      width: 100%;
      max-width: 780px;
      position: relative;
      z-index: 1;
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(18px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 20px;
      padding: 0 4px;
    }

    .header-icon {
      width: 44px;
      height: 44px;
      background: var(--primary);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 12px var(--primary-glow);
      flex-shrink: 0;
    }

    .header-icon i,
    .header-icon svg {
      width: 22px;
      height: 22px;
      fill: none;
      stroke: #fff;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .header-text h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      color: var(--text);
      letter-spacing: -0.3px;
      line-height: 1.2;
    }

    .header-text p {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* ── Server status pill (bottom right) ── */
    .server-status-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 8px 16px;
      border-radius: 99px;
      box-shadow: var(--shadow-md);
      z-index: 100;
      transition: all 0.3s ease;
    }

    .status-dot-indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #f59e0b;
      box-shadow: 0 0 6px rgba(245, 158, 11, 0.5);
      flex-shrink: 0;
    }

    .status-dot-indicator.online {
      background: #22c55e;
      box-shadow: 0 0 6px rgba(34, 197, 94, 0.5);
      animation: pulse 2s ease infinite;
    }

    .status-dot-indicator.offline {
      background: #ef4444;
      box-shadow: 0 0 6px rgba(239, 68, 68, 0.5);
    }

    /* ── Connecting banner ── */
    .chat-banner {
      background: rgba(245, 158, 11, 0.1);
      color: #b45309;
      padding: 10px 16px;
      border-radius: var(--radius-sm);
      font-size: 13.5px;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      font-weight: 500;
      animation: fadeIn 0.3s ease;
    }

    .chat-banner.online {
      display: none;
    }

    .chat-banner svg {
      width: 16px;
      height: 16px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      100% {
        transform: rotate(360deg);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.5;
      }
    }

    /* ── Chat box ── */
    .chat-container {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-lg);
      display: flex;
      flex-direction: column;
      height: 72vh;
      min-height: 480px;
      overflow: hidden;
    }

    .messages {
      flex: 1;
      padding: 24px 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 18px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar {
      width: 5px;
    }

    .messages::-webkit-scrollbar-track {
      background: transparent;
    }

    .messages::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 99px;
    }

    /* ── Empty state ── */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-muted);
      text-align: center;
      padding: 40px 20px;
    }

    .empty-state-icon {
      width: 56px;
      height: 56px;
      background: var(--primary-light);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 4px;
    }

    .empty-state-icon i,
    .empty-state-icon svg {
      width: 26px;
      height: 26px;
      stroke: var(--primary);
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .empty-state h3 {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
    }

    .empty-state p {
      font-size: 13.5px;
      color: var(--text-muted);
      max-width: 280px;
      line-height: 1.6;
    }

    /* ── Chunk stats bar inside empty state ── */
    .stats-bar {
      display: flex;
      gap: 20px;
      margin-top: 4px;
    }

    .stat-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .stat-value {
      font-size: 18px;
      font-weight: 600;
      color: var(--primary);
    }

    .stat-label {
      font-size: 11px;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 8px;
    }

    .suggestion-chip {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 6px 14px;
      font-size: 12.5px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s ease;
      font-family: 'DM Sans', sans-serif;
    }

    .suggestion-chip:hover {
      background: var(--primary-light);
      border-color: var(--primary);
      color: var(--primary);
    }

    /* ── Message bubbles ── */
    .msg {
      display: flex;
      flex-direction: column;
      animation: msgIn 0.25s ease both;
    }

    @keyframes msgIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .msg.user {
      align-items: flex-end;
    }

    .msg.bot {
      align-items: flex-start;
    }

    .bubble {
      max-width: 78%;
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 14.5px;
      line-height: 1.65;
    }

    .msg.user .bubble {
      background: var(--primary);
      color: #fff;
      border-bottom-right-radius: var(--radius-xs);
      box-shadow: 0 3px 12px var(--primary-glow);
    }

    .msg.bot .bubble {
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border);
      border-bottom-left-radius: var(--radius-xs);
      box-shadow: var(--shadow-sm);
    }

    .msg.bot .bubble p {
      margin-bottom: 10px;
    }

    .msg.bot .bubble p:last-child {
      margin-bottom: 0;
    }

    .msg.bot .bubble ul,
    .msg.bot .bubble ol {
      margin-left: 20px;
      margin-bottom: 10px;
    }

    .msg.bot .bubble li {
      margin-bottom: 4px;
    }

    .msg.bot .bubble strong {
      font-weight: 600;
      color: var(--primary-dark);
    }

    .msg.bot .bubble code {
      background: rgba(0, 0, 0, 0.05);
      padding: 2px 4px;
      border-radius: 4px;
      font-size: 13px;
      font-family: monospace;
    }

    .msg.bot .bubble pre {
      background: var(--surface);
      padding: 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      overflow-x: auto;
      margin-bottom: 10px;
    }

    .msg.bot .bubble pre code {
      background: transparent;
      padding: 0;
    }

    /* ── Label row: "Assistant" + model badge ── */
    .msg-label-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 5px;
      padding: 0 4px;
    }

    .msg-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--text-light);
    }

    /* ── Model badge (Gemini / Groq) ── */
    .model-badge {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 99px;
      border: 1px solid;
    }

    .model-badge.gemini {
      color: #1a73e8;
      background: #e8f1fd;
      border-color: #c5d9f9;
    }

    .model-badge.groq {
      color: #7c3aed;
      background: #f3eeff;
      border-color: #ddd0fa;
    }

    /* ── Sources card ── */
    .sources {
      margin-top: 10px;
      padding: 10px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      max-width: 78%;
    }

    .sources-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-light);
      margin-bottom: 7px;
    }

    .source-link {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12.5px;
      color: var(--primary);
      text-decoration: none;
      padding: 3px 0;
      transition: color 0.15s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .source-link::before {
      content: '';
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--primary);
      flex-shrink: 0;
    }

    .source-link:hover {
      color: var(--primary-dark);
      text-decoration: underline;
    }

    /* ── Thinking loader ── */
    .thinking .bubble {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 14px 18px;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-light);
      animation: bounce 1.2s ease infinite;
    }

    .dot:nth-child(2) {
      animation-delay: 0.2s;
    }

    .dot:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes bounce {

      0%,
      80%,
      100% {
        transform: scale(0.7);
        opacity: 0.5;
      }

      40% {
        transform: scale(1);
        opacity: 1;
      }
    }

    /* ── Input area ── */
    .input-area {
      padding: 14px 16px;
      border-top: 1px solid var(--border);
      background: var(--surface-2);
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .input-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 0 16px;
      transition: all 0.2s;
    }

    .input-wrap:focus-within {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-glow), inset 0 0 10px rgba(48, 127, 226, 0.02);
    }

    .search-icon {
      width: 18px;
      height: 18px;
      color: var(--text-light);
      margin-right: 12px;
      flex-shrink: 0;
    }

    input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      font-family: 'DM Sans', sans-serif;
      font-size: 14.5px;
      color: var(--text);
      padding: 13px 0;
    }

    input:disabled {
      cursor: not-allowed;
      opacity: 0.6;
    }

    input::placeholder {
      color: var(--text-light);
    }

    /* ── Visualizer ── */
    .visualizer {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 3px;
      height: 12px;
      margin-bottom: 8px;
      width: 100%;
    }

    .visualizer.active {
      display: flex;
    }

    .visualizer .bar {
      width: 2.5px;
      height: 3px;
      background: var(--primary);
      border-radius: 1px;
      transition: height 0.1s;
    }

    .visualizer.active .bar {
      animation: wave 0.8s infinite alternate-reverse ease-in-out;
    }

    .visualizer.active .bar:nth-child(even) {
      animation-delay: 0.1s;
    }

    .visualizer.active .bar:nth-child(3n) {
      animation-delay: 0.2s;
    }

    @keyframes wave {
      from {
        height: 3px;
      }

      to {
        height: 12px;
      }
    }

    /* ── Action Buttons inside Input ── */
    .input-actions {
      display: flex;
      gap: 4px;
      margin-left: auto;
      padding-left: 10px;
    }

    /* ── Enhance button ── */
    .enhance-btn {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text-light);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: all 0.2s;
    }

    .enhance-btn:hover:not(:disabled) {
      color: var(--primary);
      background: rgba(48, 127, 226, 0.05);
    }

    .enhance-btn svg {
      width: 18px;
      height: 18px;
    }

    /* ── Mic button ── */
    .mic-btn {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text-light);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: all 0.2s;
    }

    .mic-btn:hover:not(:disabled):not(.listening) {
      color: var(--primary);
      background: rgba(48, 127, 226, 0.05);
    }

    .mic-btn.listening {
      background: rgba(239, 68, 68, 0.05);
      color: #ef4444;
    }

    .mic-btn svg {
      width: 18px;
      height: 18px;
    }

    @keyframes rotate-glow {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    .send-btn {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      border: none;
      background: var(--primary);
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .send-btn:disabled {
      background: var(--text-light);
      opacity: 0.5;
    }

    .send-btn svg {
      width: 18px;
      height: 18px;
      stroke: #fff;
      stroke-width: 2;
    }

    /* Recommendations / Ambiguity Buttons */
    .recommendations {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }
    .opt-btn {
      background: rgba(var(--primary-rgb), 0.1);
      color: var(--primary);
      border: 1px solid rgba(var(--primary-rgb), 0.2);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .opt-btn:hover {
      background: var(--primary);
      color: var(--bg);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(var(--primary-rgb), 0.3);
    }

    .footer {
      text-align: center;
      margin-top: 14px;
      font-size: 12px;
      color: var(--text-light);
    }
  </style>
</head>

<body>

  <div class="wrapper">

    <div class="header">
      <div class="header-icon">
        <i data-lucide="library"></i>
      </div>
      <div class="header-text">
        <h1>Knowledge Assistant</h1>
        <p>Ask anything from your knowledge base</p>
      </div>
    </div>

    <div class="chat-container">
      <div class="chat-banner" id="chatBanner">
        <i data-lucide="loader-2"></i>
        Server is connecting... Please wait.
      </div>

      <div class="messages" id="messages">
        <div class="empty-state" id="emptyState">
          <div class="empty-state-icon">
            <i data-lucide="message-square"></i>
          </div>
          <h3>How can I help you?</h3>
          <p>Ask a question and I'll search your knowledge base for the best answer.</p>

          <!-- ── Live stats from /health ── -->
          <div class="stats-bar" id="statsBar" style="display:none">
            <div class="stat-item">
              <span class="stat-value" id="statChunks">—</span>
              <span class="stat-label">Chunks</span>
            </div>
            <div class="stat-item">
              <span class="stat-value" id="statVectors">—</span>
              <span class="stat-label">Vectors</span>
            </div>
            <div class="stat-item">
              <span class="stat-value" id="statParents">—</span>
              <span class="stat-label">Articles</span>
            </div>
          </div>

          <div class="suggestions">
            <button class="suggestion-chip" onclick="fillInput(this)">What is an asset?</button>
            <button class="suggestion-chip" onclick="fillInput(this)">How to upload a document?</button>
            <button class="suggestion-chip" onclick="fillInput(this)">What are Mitab Topics?</button>
          </div>
        </div>
      </div>

      <div class="input-area">
        <div class="visualizer" id="visualizer">
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
        </div>
        <div class="input-wrap">
          <i data-lucide="search" class="search-icon"></i>
          <input id="input" placeholder="Server is connecting..." autocomplete="off" disabled />
          <div class="input-actions">
            <button class="enhance-btn" id="enhanceBtn" onclick="enhanceQuery()" title="Enhance prompt" disabled>
              <i data-lucide="sparkles"></i>
            </button>
            <button class="mic-btn" id="micBtn" onclick="toggleMic()" title="Voice Input" disabled>
              <i data-lucide="mic"></i>
            </button>
            <button class="send-btn" id="sendBtn" onclick="send()" title="Send" disabled>
              <i data-lucide="send"></i>
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="footer">Powered by your knowledge base · RAG Assistant</div>
  </div>

  <!-- Server status pill -->
  <div class="server-status-btn" id="serverStatusWidget">
    <div class="status-dot-indicator" id="statusDotIndicator"></div>
    <span id="statusTextWidget">Connecting...</span>
  </div>

  <script>
    const BACKEND_URL = "http://localhost:8000";
    const messagesEl = document.getElementById("messages");
    const inputEl = document.getElementById("input");
    const emptyState = document.getElementById("emptyState");
    const sendBtn = document.getElementById("sendBtn");
    const enhanceBtn = document.getElementById("enhanceBtn");
    const micBtn = document.getElementById("micBtn");
    const chatBanner = document.getElementById("chatBanner");
    const statusDot = document.getElementById("statusDotIndicator");
    const statusText = document.getElementById("statusTextWidget");
    const visualizerEl = document.getElementById("visualizer");
    const statsBar = document.getElementById("statsBar");
    const statChunks = document.getElementById("statChunks");
    const statVectors = document.getElementById("statVectors");
    const statParents = document.getElementById("statParents");

    let isServerConnected = false;
    let chatHistory = []; // Track recent conversation memory
    let lastInputMethod = "text"; // "text" or "voice"

    // ── GUIDED MODE STATE ──
    let guidedMode = false;
    let guidedData = null;
    let currentStep = 0;
    let inGuidePrompt = false; // waiting for user to say "yes" to start guide

    // ── Health check — now also reads chunk/vector counts ──
    async function checkServerStatus() {
      try {
        const res = await fetch(`${BACKEND_URL}/health`);
        if (!res.ok) throw new Error("Not OK");
        const info = await res.json();

        if (!isServerConnected) {
          isServerConnected = true;
          inputEl.disabled = false;
          sendBtn.disabled = false;
          enhanceBtn.disabled = false;
          micBtn.disabled = false;
          inputEl.placeholder = "Ask a question…";
          chatBanner.classList.add("online");
          statusDot.className = "status-dot-indicator online";
          statusText.textContent = "Server is running";

          // Show live stats in empty state
          statChunks.textContent = (info.chunks_loaded || "—").toLocaleString();
          statVectors.textContent = (info.vectors_indexed || "—").toLocaleString();
          statParents.textContent = (info.parents_loaded || "—").toLocaleString();
          statsBar.style.display = "flex";
        }
      } catch {
        if (isServerConnected !== false) {
          isServerConnected = false;
          inputEl.disabled = true;
          sendBtn.disabled = true;
          enhanceBtn.disabled = true;
          micBtn.disabled = true;
          inputEl.placeholder = "Server disconnected...";
          chatBanner.classList.remove("online");
          chatBanner.innerHTML = `<i data-lucide="circle-off"></i> Server disconnected. Attempting to reconnect...`;
          lucide.createIcons();
          chatBanner.style.color = "#ef4444";
          chatBanner.style.background = "rgba(239,68,68,0.1)";
          statusDot.className = "status-dot-indicator offline";
          statusText.textContent = "Disconnected";
          statsBar.style.display = "none";
        }
      }
    }

    setInterval(checkServerStatus, 2000);
    checkServerStatus();

    // ── VOICE LOGIC (Web Speech API) ──
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition;
    let isListening = false;

    if (SpeechRecognition) {
      recognition = new SpeechRecognition();
      recognition.continuous = false;
      recognition.interimResults = false;

      recognition.onstart = () => {
        isListening = true;
        micBtn.classList.add("listening");
        visualizerEl.classList.add("active");
      };

      recognition.onend = () => {
        isListening = false;
        micBtn.classList.remove("listening");
        visualizerEl.classList.remove("active");
      };

      recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript;
        inputEl.value = transcript;
        lastInputMethod = "voice";
        send(); // Send immediately if voice command
        lastInputMethod = "text"; // reset back for normal typing
      };
    }

    function toggleMic() {
      if (!recognition) {
        alert("Your browser does not support Voice Recognition.");
        return;
      }
      if (isListening) {
        recognition.stop();
      } else {
        // Interrupt AI voice if talking
        window.speechSynthesis.cancel();
        recognition.start();
      }
    }

    function speak(text) {
      if (!window.speechSynthesis) return;
      window.speechSynthesis.cancel(); // Stop current speech

      // Strip markdown syntax for natural reading
      const cleanText = text.replace(/[*_#`]/g, "");
      const utterance = new SpeechSynthesisUtterance(cleanText);

      // Try to find a good English voice
      const voices = window.speechSynthesis.getVoices();
      utterance.voice = voices.find(v => v.name.includes("Google") && v.name.includes("English")) || voices[0];
      utterance.rate = 1.05; // Slightly faster

      // Automatically turn mic back on if we are doing a guided flow
      utterance.onstart = () => {
        visualizerEl.classList.add("active");
      };

      utterance.onend = () => {
        visualizerEl.classList.remove("active");
        if (guidedMode && recognition && !isListening) {
          recognition.start();
        }
      };

      window.speechSynthesis.speak(utterance);
    }

    // Load voices on page load (Fixes Chrome voice init bug)
    window.speechSynthesis?.onvoiceschanged?.();

    // ── CHAT LOGIC ──
    function fillInput(btn) { 
      inputEl.value = btn.textContent; 
      inputEl.focus(); 
      send(); // Enable auto-send for suggestion chips as well
    }
    function hideEmpty() { if (emptyState) emptyState.style.display = "none"; }
    function scroll() { messagesEl.scrollTop = messagesEl.scrollHeight; }
    function escHtml(str) { return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;"); }

    function addUserMsg(text) {
      hideEmpty();
      const msg = document.createElement("div");
      msg.className = "msg user";
      msg.innerHTML = `
      <div class="msg-label-row"><span class="msg-label">You</span></div>
      <div class="bubble">${escHtml(text)}</div>`;
      messagesEl.appendChild(msg);
      scroll();
    }

    // ── addBotMsg now accepts recommendations ──
    function addBotMsg(text, sources = [], titles = [], modelUsed = "", recommendations = []) {
      hideEmpty();
      const msg = document.createElement("div");
      msg.className = "msg bot";

      // Model badge
      const badgeHtml = modelUsed
        ? `<span class="model-badge ${modelUsed.toLowerCase()}">${modelUsed}</span>`
        : "";

      // Sources
      let srcHtml = "";
      const shownSources = sources.slice(0, 3);
      if (shownSources.length) {
        const links = shownSources.map((url, i) => {
          const label = (titles && titles[i]) ? titles[i] : shortenUrl(url);
          return `<a class="source-link" href="${url}" target="_blank" title="${url}">${escHtml(label)}</a>`;
        }).join("");
        srcHtml = `<div class="sources"><div class="sources-title">Sources</div>${links}</div>`;
      }

      // Recommendations / Ambiguity Options
      let recHtml = "";
      if (recommendations && recommendations.length) {
        const btns = recommendations.map(opt => 
          `<button class="opt-btn" onclick="sendOption('${escHtml(opt)}')">
            <i data-lucide="message-square" style="width:14px;height:14px"></i>
            ${escHtml(opt)}
          </button>`
        ).join("");
        recHtml = `<div class="recommendations">${btns}</div>`;
      }

      msg.innerHTML = `
      <div class="msg-label-row">
        <span class="msg-label">Assistant</span>
        ${badgeHtml}
      </div>
      <div class="bubble">${marked.parse(text)}</div>
      ${srcHtml}
      ${recHtml}`;
      messagesEl.appendChild(msg);
      lucide.createIcons(); // Refresh icons for new buttons
      scroll();
    }

    function sendOption(opt) {
      inputEl.value = opt;
      send();
    }

    // ── Fallback links shown when no info found in KB ──
    function addFallbackLinks(searchUrl, modelUsed = "") {
      hideEmpty();
      const msg = document.createElement("div");
      msg.className = "msg bot";

      const badgeHtml = modelUsed
        ? `<span class="model-badge ${modelUsed.toLowerCase()}">${modelUsed}</span>`
        : "";

      const links = [
        { url: searchUrl, label: "🔍 Search Hushly Knowledge Base" },
        { url: "https://hushly.freshdesk.com/support/home", label: "🏠 Hushly Support Home" },
        { url: "mailto:support@hushly.com", label: "✉️ Contact Hushly Support" },
      ].map(l =>
        `<a class="source-link" href="${l.url}" target="_blank">${escHtml(l.label)}</a>`
      ).join("");

      msg.innerHTML = `
      <div class="msg-label-row">
        <span class="msg-label">Assistant</span>
        ${badgeHtml}
      </div>
      <div class="bubble">I don't have that information in the knowledge base. Please check the links below:</div>
      <div class="sources"><div class="sources-title">Helpful Links</div>${links}</div>`;
      messagesEl.appendChild(msg);
      scroll();
    }

    // Shorten raw URL to last slug segment as fallback label
    function shortenUrl(url) {
      try {
        const slug = new URL(url).pathname.split("/").filter(Boolean).pop() || url;
        return slug.replace(/-/g, " ").replace(/\b\w/g, c => c.toUpperCase());
      } catch { return url; }
    }

    function addThinking() {
      hideEmpty();
      const msg = document.createElement("div");
      msg.className = "msg bot thinking";
      msg.id = "thinking";
      msg.innerHTML = `
      <div class="msg-label-row"><span class="msg-label">Assistant</span></div>
      <div class="bubble">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>`;
      messagesEl.appendChild(msg);
      scroll();
      return msg;
    }

    function removeThinking() {
      const t = document.getElementById("thinking");
      if (t) t.remove();
    }

    async function enhanceQuery() {
      const query = inputEl.value.trim();
      if (!query) return;

      enhanceBtn.disabled = true;
      enhanceBtn.classList.add("loading");

      try {
        const res = await fetch(`${BACKEND_URL}/enhance`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            query,
            history: chatHistory.slice(-4) // Pass only recent history
          })
        });

        if (res.ok) {
          const data = await res.json();
          inputEl.value = data.enhanced;
          inputEl.focus();
        }
      } catch (e) {
        console.error("Enhance failed:", e);
      } finally {
        enhanceBtn.classList.remove("loading");
        enhanceBtn.disabled = false;
      }
    }

    async function send() {
      const query = inputEl.value.trim();
      if (!query) return;
      inputEl.value = "";
      addUserMsg(query);

      const qLower = query.toLowerCase();

      // IF WAITING FOR THEM TO START THE GUIDE
      if (inGuidePrompt) {
        if (qLower.match(/yes|yeah|yep|sure|ok|okay|start|guide/)) {
          inGuidePrompt = false;
          startGuide();
          return;
        } else if (qLower.match(/no|nope|nah|skip/)) {
          inGuidePrompt = false;
          addBotMsg("Okay, no problem. Let me know if you need anything else!");
          return;
        }
      }

      // IF ALREADY IN GUIDED MODE, INTERCEPT NAVIGATION COMMANDS (next, back, repeat, stop)
      if (guidedMode && guidedData) {
        if (qLower.match(/next|done|continue|finished|yes|yep/)) {
          nextStep();
          return;
        } else if (qLower.match(/back|previous/)) {
          prevStep();
          return;
        } else if (qLower.match(/repeat|say that again/)) {
          readCurrentStep();
          return;
        } else if (qLower.match(/stop|cancel|quit/)) {
          stopGuide();
          return;
        }
        // If it's a completely unrelated question while in guide mode:
        // Let it pass through to the RAG backend, and suspend the guide.
        guidedMode = false;
        addBotMsg("*(Suspending guide to answer your new question...)*");
      }

      addThinking();

      try {
        const res = await fetch(`${BACKEND_URL}/ask`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            query,
            history: chatHistory.slice(-4) // Pass last 4 messages for context
          })
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.error || "Server error");
        }

        const data = await res.json();
        removeThinking();

        if (data.no_info) {
          // Show exactly the 3 fallback links — no KB sources
          addFallbackLinks(data.search_url, data.model_used || "");
          chatHistory.push({ role: "user", content: query });
          chatHistory.push({ role: "assistant", content: "I don't have that information in the knowledge base." });
        } else {
          // Normal KB answer
          addBotMsg(data.answer, data.sources || [], data.titles || [], data.model_used || "", data.recommendations || []);
          chatHistory.push({ role: "user", content: query });
          chatHistory.push({ role: "assistant", content: data.answer });

          // Check if this answer contains step-by-step instructions silently
          checkActionable(data.answer);
        }
      } catch (err) {
        removeThinking();
        addBotMsg(`⚠️ ${err.message}`);
      }
    }

    // ── GUIDED MODE LOGIC ──
    async function checkActionable(answerText) {
      try {
        const res = await fetch(`${BACKEND_URL}/generate_steps`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ answer: answerText })
        });
        if (res.ok) {
          const data = await res.json();
          if (data.is_actionable_task && data.steps && data.steps.length > 0) {
            guidedData = data;
            inGuidePrompt = true;

            const promptMsg = `I can guide you through **"${data.task_title}"** step-by-step. Do you want to start the guide?`;

            // Add a custom button inside the message
            const btnHtml = `<br><br><button onclick="startGuideMsg()" style="background:var(--primary);color:var(--bg);border:none;padding:6px 12px;border-radius:6px;cursor:pointer;font-weight:500;margin-top:8px">Start Guide</button>`;

            addBotMsg(promptMsg + btnHtml);

            // If the user last used their voice, speak the offer out loud!
            if (lastInputMethod === "voice") {
              speak(`I can guide you through ${data.task_title} step by step. Just say yes to start.`);
            }
          }
        }
      } catch (e) {
        console.error("Failed to generate steps", e);
      }
    }

    window.startGuideMsg = () => {
      // Triggered by the inline button
      if (inGuidePrompt) {
        inGuidePrompt = false;
        addUserMsg("Start Voice guide");
        startGuide();
      }
    };

    function startGuide() {
      guidedMode = true;
      currentStep = 0;
      addBotMsg(`**Guided Mode Started: ${guidedData.task_title}**\n\n*(Say or type "next", "back", "repeat", or "stop")*`);
      readCurrentStep();
    }

    function readCurrentStep() {
      const txt = guidedData.steps[currentStep];
      const stepText = `**Step ${currentStep + 1} of ${guidedData.steps.length}:** ${txt}`;
      addBotMsg(stepText);
      speak(`Step ${currentStep + 1}: ${txt}`);
    }

    function nextStep() {
      currentStep++;
      if (currentStep >= guidedData.steps.length) {
        guidedMode = false;
        const msg = "Task complete! Great job. What else can I help you with?";
        addBotMsg(`🎉 **${msg}**`);
        speak(msg);
      } else {
        readCurrentStep();
      }
    }

    function prevStep() {
      if (currentStep > 0) {
        currentStep--;
        addBotMsg("*(Going back one step)*");
        readCurrentStep();
      } else {
        addBotMsg("*(You are already on the first step)*");
        readCurrentStep();
      }
    }

    function stopGuide() {
      guidedMode = false;
      inGuidePrompt = false;
      addBotMsg("*(Guided mode stopped)*");
      window.speechSynthesis?.cancel();
    }

    inputEl.addEventListener("keypress", e => { if (e.key === "Enter") send(); });
    
    // Initialize Lucide icons
    lucide.createIcons();
  </script>
</body>

</html>
